name: Quality Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint & Type Check
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Create .npmrc for pnpm hoisting
        run: |
          echo "auto-install-peers=true" > .npmrc
          echo "public-hoist-pattern[]=*types*" >> .npmrc
          echo "public-hoist-pattern[]=prop-types" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Run ESLint
        run: pnpm lint
        continue-on-error: false

      - name: Check for console.log
        run: |
          echo "Checking for console.log remnants..."
          if grep -rn "console\.log" --include="*.ts" --include="*.tsx" src/ --exclude-dir=node_modules 2>/dev/null | grep -v "// eslint-disable" | grep -v ".stories." | head -20; then
            echo "Warning: console.log detected"
          fi

      - name: Check for any type
        run: |
          echo "Checking for 'any' type usage..."
          if grep -rn ": any" --include="*.ts" --include="*.tsx" src/ --exclude-dir=node_modules 2>/dev/null | grep -v "// eslint-disable" | head -20; then
            echo "Warning: 'any' type detected"
          fi

  # Unit Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Create .npmrc for pnpm hoisting
        run: |
          echo "auto-install-peers=true" > .npmrc
          echo "public-hoist-pattern[]=*types*" >> .npmrc
          echo "public-hoist-pattern[]=prop-types" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm test:all
        continue-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # Storybook Build Check
  storybook-build:
    name: Storybook Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Create .npmrc for pnpm hoisting
        run: |
          echo "auto-install-peers=true" > .npmrc
          echo "public-hoist-pattern[]=*types*" >> .npmrc
          echo "public-hoist-pattern[]=prop-types" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook
        env:
          NODE_OPTIONS: --max_old_space_size=4096

  # Change Analysis
  change-analysis:
    name: Change Analysis
    runs-on: ubuntu-latest
    outputs:
      has_component_changes: ${{ steps.check.outputs.has_component_changes }}
      has_story_changes: ${{ steps.check.outputs.has_story_changes }}
      changed_files_count: ${{ steps.check.outputs.changed_files_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze changes
        id: check
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || echo "")

          if echo "$CHANGED_FILES" | grep -q "src/components/"; then
            echo "has_component_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_component_changes=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q "\.stories\."; then
            echo "has_story_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_story_changes=false" >> $GITHUB_OUTPUT
          fi

          CHANGED_COUNT=$(echo "$CHANGED_FILES" | grep -c "\.tsx\|\.ts") || CHANGED_COUNT=0
          echo "changed_files_count=$CHANGED_COUNT" >> $GITHUB_OUTPUT

          echo "Changed files:"
          echo "$CHANGED_FILES" | head -30

  # Quality Summary
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, storybook-build, change-analysis]
    if: always()
    steps:
      - name: Create summary
        env:
          LINT_RESULT: ${{ needs.lint-and-typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          SB_RESULT: ${{ needs.storybook-build.result }}
          HAS_COMPONENT: ${{ needs.change-analysis.outputs.has_component_changes }}
          HAS_STORY: ${{ needs.change-analysis.outputs.has_story_changes }}
          CHANGED_COUNT: ${{ needs.change-analysis.outputs.changed_files_count }}
        run: |
          echo "## Quality Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${LINT_RESULT}" == "success" ]; then
            echo "- Lint & TypeCheck: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Lint & TypeCheck: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${TEST_RESULT}" == "success" ]; then
            echo "- Unit Tests: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Unit Tests: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${SB_RESULT}" == "success" ]; then
            echo "- Storybook Build: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Storybook Build: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Change Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- Component changes: ${HAS_COMPONENT}" >> $GITHUB_STEP_SUMMARY
          echo "- Storybook changes: ${HAS_STORY}" >> $GITHUB_STEP_SUMMARY
          echo "- Changed files count: ${CHANGED_COUNT}" >> $GITHUB_STEP_SUMMARY
