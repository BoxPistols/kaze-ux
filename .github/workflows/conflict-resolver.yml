name: Conflict Resolver

on:
  # PRにコンフリクトが発生したときに自動トリガー
  pull_request:
    types: [opened, synchronize]
  # コメントでトリガー
  issue_comment:
    types: [created]
  # 手動トリガー
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR番号'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  # コンフリクト検出
  detect-conflicts:
    name: Detect Conflicts
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/resolve-conflict'))
    outputs:
      has_conflicts: ${{ steps.check.outputs.has_conflicts }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      conflict_files: ${{ steps.check.outputs.conflict_files }}
    steps:
      - name: Get PR info
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;

            if (context.eventName === 'workflow_dispatch') {
              prNumber = ${{ github.event.inputs.pr_number || 0 }};
            } else if (context.eventName === 'issue_comment') {
              prNumber = context.issue.number;
            } else {
              prNumber = context.payload.pull_request?.number;
            }

            if (!prNumber) {
              core.setFailed('PR番号を取得できませんでした');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            core.setOutput('pr_number', prNumber);
            core.setOutput('mergeable', pr.mergeable);
            core.setOutput('mergeable_state', pr.mergeable_state);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('base_ref', pr.base.ref);

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for conflicts
        id: check
        run: |
          PR_NUMBER="${{ steps.pr-info.outputs.pr_number }}"
          BASE_REF="${{ steps.pr-info.outputs.base_ref }}"
          MERGEABLE="${{ steps.pr-info.outputs.mergeable }}"

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

          # リモートから最新を取得
          git fetch origin $BASE_REF

          # マージをシミュレート
          if git merge --no-commit --no-ff origin/$BASE_REF 2>&1 | grep -q "CONFLICT"; then
            echo "has_conflicts=true" >> $GITHUB_OUTPUT

            # コンフリクトファイルを取得
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U | tr '\n' ',' | sed 's/,$//')
            echo "conflict_files=$CONFLICT_FILES" >> $GITHUB_OUTPUT

            echo "コンフリクトが検出されました: $CONFLICT_FILES"
          else
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
            echo "conflict_files=" >> $GITHUB_OUTPUT
            echo "コンフリクトはありません"
          fi

          # マージを中止
          git merge --abort 2>/dev/null || true

  # AIによるコンフリクト解決
  resolve-conflicts:
    name: AI Conflict Resolution
    runs-on: ubuntu-latest
    needs: detect-conflicts
    if: needs.detect-conflicts.outputs.has_conflicts == 'true'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Fetch base branch
        run: |
          git fetch origin main
          git fetch origin --tags

      - name: Attempt merge and collect conflicts
        id: merge-attempt
        run: |
          # マージを試行
          git merge origin/main --no-commit --no-ff 2>&1 || true

          # コンフリクトファイルを取得
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
          echo "コンフリクトファイル:"
          echo "$CONFLICT_FILES"

          # コンフリクト内容を保存
          mkdir -p .conflict-data

          for file in $CONFLICT_FILES; do
            if [ -f "$file" ]; then
              cp "$file" ".conflict-data/$(basename $file).conflict"
            fi
          done

          echo "conflict_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CONFLICT_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve conflicts with AI
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // OpenAI API呼び出し（フォールバック対応）
            async function callOpenAI(systemPrompt, userPrompt) {
              const models = ['gpt-4.1-nano', 'gpt-4.1-mini'];

              for (const model of models) {
                try {
                  console.log(`モデル ${model} で試行中...`);
                  const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                      'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      model: model,
                      messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt }
                      ],
                      temperature: 0.1,
                      max_tokens: 4000
                    })
                  });

                  if (!response.ok) {
                    console.log(`${model} エラー: ${response.status}`);
                    continue;
                  }

                  const data = await response.json();
                  if (data.choices?.[0]?.message?.content) {
                    console.log(`${model} で成功`);
                    return data.choices[0].message.content;
                  }
                } catch (error) {
                  console.log(`${model} 例外: ${error.message}`);
                  continue;
                }
              }
              return null;
            }

            const conflictFiles = `${{ steps.merge-attempt.outputs.conflict_files }}`.split('\n').filter(f => f.trim());

            if (conflictFiles.length === 0) {
              console.log('解決するコンフリクトがありません');
              return;
            }

            console.log(`${conflictFiles.length}件のコンフリクトを解決します`);

            const systemPrompt = 'あなたはGitマージコンフリクトを解決する専門家です。両方の変更を適切に統合してください。';

            for (const file of conflictFiles) {
              if (!fs.existsSync(file)) continue;

              const content = fs.readFileSync(file, 'utf8');

              // コンフリクトマーカーが含まれているか確認
              if (!content.includes('<<<<<<<') || !content.includes('>>>>>>>')) {
                console.log(`${file}: コンフリクトマーカーなし、スキップ`);
                continue;
              }

              console.log(`${file} を解決中...`);

              const prompt = `以下のファイルにはGitマージコンフリクトがあります。
              両方の変更を適切に統合して、コンフリクトを解決してください。

              ルール:
              1. 両方の変更の意図を理解し、機能を保持する
              2. TypeScriptの型整合性を維持する
              3. 重複したインポートは1つにまとめる
              4. コンフリクトマーカー(<<<<<<<, =======, >>>>>>>)は完全に削除する

              ファイル: ${file}

              コンフリクト内容:
              ${content}

              解決後のコードのみを返してください。説明は不要です。`;

              try {
                let resolvedCode = await callOpenAI(systemPrompt, prompt);

                if (resolvedCode) {
                  // コードブロックを除去
                  resolvedCode = resolvedCode.replace(/^```[\w]*\n?/gm, '').replace(/\n?```$/gm, '').trim();

                  if (resolvedCode && !resolvedCode.includes('<<<<<<<')) {
                    fs.writeFileSync(file, resolvedCode);
                    execSync(`git add "${file}"`);
                    console.log(`${file}: 解決完了`);
                  } else {
                    console.log(`${file}: AI解決に失敗、手動解決が必要`);
                  }
                } else {
                  console.log(`${file}: API呼び出し失敗、手動解決が必要`);
                }
              } catch (error) {
                console.error(`${file} の解決中にエラー: ${error}`);
              }
            }

      - name: Complete merge if all resolved
        id: complete-merge
        run: |
          # 未解決のコンフリクトを確認
          UNRESOLVED=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "")

          if [ -z "$UNRESOLVED" ]; then
            echo "全てのコンフリクトが解決されました"
            git commit -m "fix: マージコンフリクトをAIで自動解決

            [Conflict Resolver] mainブランチとのコンフリクトを自動解決しました。"
            git push
            echo "resolved=true" >> $GITHUB_OUTPUT
          else
            echo "未解決のコンフリクト: $UNRESOLVED"
            git merge --abort 2>/dev/null || true
            echo "resolved=false" >> $GITHUB_OUTPUT
          fi

      - name: Post result comment
        uses: actions/github-script@v7
        with:
          script: |
            const resolved = '${{ steps.complete-merge.outputs.resolved }}' === 'true';
            const prNumber = ${{ needs.detect-conflicts.outputs.pr_number }};

            let body;
            if (resolved) {
              body = `## コンフリクト解決完了

              AIによってマージコンフリクトが自動解決されました。
              変更内容を確認してください。

              ---
              *[Conflict Resolver] 自動実行*`;
            } else {
              body = `## コンフリクト解決失敗

              一部のコンフリクトを自動解決できませんでした。
              手動での解決が必要です。

              ### コンフリクトファイル:
              ${{ needs.detect-conflicts.outputs.conflict_files }}

              ---
              *[Conflict Resolver] 自動実行*`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

  # コンフリクトがない場合の通知
  no-conflicts:
    name: No Conflicts
    runs-on: ubuntu-latest
    needs: detect-conflicts
    if: needs.detect-conflicts.outputs.has_conflicts == 'false' && github.event_name == 'issue_comment'
    steps:
      - name: Post no conflict comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-conflicts.outputs.pr_number }},
              body: `## コンフリクトなし

              現在、このPRにはマージコンフリクトはありません。

              ---
              *[Conflict Resolver] 自動実行*`
            });
