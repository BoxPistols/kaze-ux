name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# GitHub Pages deployment permissions
permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Create .npmrc for pnpm hoisting
        run: |
          echo "auto-install-peers=true" > .npmrc
          echo "public-hoist-pattern[]=*types*" >> .npmrc
          echo "public-hoist-pattern[]=prop-types" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Prepare deployment directory
        run: |
          mkdir -p gh-pages/storybook
          cp -r storybook-static/* gh-pages/storybook/

      - name: Build SaaS Dashboard Demo
        run: pnpm --filter saas-dashboard build:gh-pages

      - name: Build UberEats Clone Demo
        run: pnpm --filter ubereats-clone build:gh-pages

      - name: Create landing page
        run: cp scripts/gh-pages-index.html gh-pages/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './gh-pages'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output deployment URL
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          echo "Deployment completed!"
          echo "Landing: ${PAGE_URL}"
          echo "Storybook: ${PAGE_URL}storybook/"
          echo "SaaS Dashboard: ${PAGE_URL}demo/saas-dashboard/"
          echo "UberEats Clone: ${PAGE_URL}demo/ubereats-clone/"
