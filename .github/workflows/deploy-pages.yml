name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'デプロイ対象'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - storybook
          - dashboard
          - ubereats

# GitHub Pages デプロイ用の権限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行の制御
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Create .npmrc for pnpm hoisting
        run: |
          echo "auto-install-peers=true" > .npmrc
          echo "public-hoist-pattern[]=*types*" >> .npmrc
          echo "public-hoist-pattern[]=prop-types" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      # デプロイ対象の判定
      - name: Determine deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.deploy_target }}" >> $GITHUB_OUTPUT
          else
            echo "target=all" >> $GITHUB_OUTPUT
          fi

      # Storybookのビルド
      - name: Build Storybook
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'storybook'
        env:
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_OPENAI_MODEL: 'gpt-4.1-nano'
        run: |
          pnpm run build-storybook
          mkdir -p gh-pages/storybook
          cp -r storybook-static/* gh-pages/storybook/

      # SaaS Dashboardのビルド
      - name: Build SaaS Dashboard Demo
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'dashboard'
        run: pnpm --filter saas-dashboard build:gh-pages

      # UberEats Cloneのビルド
      - name: Build UberEats Clone Demo
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'ubereats'
        run: pnpm --filter ubereats-clone build:gh-pages

      # ランディングページ
      - name: Create landing page
        if: steps.target.outputs.target == 'all'
        run: cp scripts/gh-pages-index.html gh-pages/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './gh-pages'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output deployment URLs
        run: |
          echo "Deployment completed!"
          echo "Storybook: ${{ steps.deployment.outputs.page_url }}storybook/"
          echo "SaaS Dashboard: ${{ steps.deployment.outputs.page_url }}demo/saas-dashboard/"
          echo "UberEats Clone: ${{ steps.deployment.outputs.page_url }}demo/ubereats-clone/"
