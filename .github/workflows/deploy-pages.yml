name: Deploy to GitHub Pages

# デプロイトリガー設定
# 現在: mainブランチへのプッシュでDev環境とStorybook両方をデプロイ
# 将来的にブランチ別デプロイに変更する場合は、このファイルのトリガー設定を変更してください
# 詳細は docs/GITHUB_PAGES.md を参照
on:
  push:
    branches:
      - main
      # 将来的にブランチ別デプロイを行う場合は以下のように設定可能:
      # - storybook  # Storybookのみデプロイ
      # - develop    # Dev環境のみデプロイ
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'デプロイ対象'
        required: true
        default: 'all'
        type: choice
        options:
          - all # Dev環境 + Storybook
          - dev # Dev環境のみ
          - storybook # Storybookのみ

# GitHub Pages デプロイ用の権限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行の制御（デプロイの競合を防ぐ）
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ビルドジョブ
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Create .npmrc for pnpm hoisting
        run: |
          echo "auto-install-peers=true" > .npmrc
          echo "public-hoist-pattern[]=*types*" >> .npmrc
          echo "public-hoist-pattern[]=prop-types" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      # デプロイ対象の判定
      - name: Determine deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.deploy_target }}" >> $GITHUB_OUTPUT
          else
            # プッシュイベントの場合はブランチ名で判定
            # 将来的にブランチ別デプロイを行う場合はここを変更
            case "${{ github.ref_name }}" in
              main)
                echo "target=all" >> $GITHUB_OUTPUT
                ;;
              storybook)
                echo "target=storybook" >> $GITHUB_OUTPUT
                ;;
              develop)
                echo "target=dev" >> $GITHUB_OUTPUT
                ;;
              *)
                echo "target=all" >> $GITHUB_OUTPUT
                ;;
            esac
          fi

      # Dev環境のビルド
      - name: Build Dev environment
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'dev'
        env:
          VITE_APP_PASSWORD: ${{ secrets.PAGES_AUTH_PASSWORD }}
        run: pnpm run build:gh-pages

      # Storybookのビルド
      - name: Build Storybook
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'storybook'
        env:
          VITE_APP_PASSWORD: ${{ secrets.PAGES_AUTH_PASSWORD }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_OPENAI_MODEL: 'gpt-5-mini'
        run: |
          if [ "${{ steps.target.outputs.target }}" = "storybook" ]; then
            # Storybookのみの場合はgh-pagesディレクトリのルートにビルド
            pnpm run build-storybook
            mkdir -p gh-pages
            cp -r storybook-static/* gh-pages/
          else
            # 両方の場合はサブディレクトリにビルド
            pnpm run build:gh-pages:storybook
          fi

      # 簡易認証スクリプトの注入（パスワードが設定されている場合のみ）
      - name: Inject authentication
        env:
          AUTH_PASSWORD: ${{ secrets.PAGES_AUTH_PASSWORD }}
        run: |
          if [ -n "$AUTH_PASSWORD" ]; then
            echo "認証スクリプトを注入します..."
            echo "パスワード長: ${#AUTH_PASSWORD} 文字"
            node scripts/inject-auth.js "$AUTH_PASSWORD"
          else
            echo "PAGES_AUTH_PASSWORD が設定されていないため、認証をスキップします"
          fi

      # 認証スクリプト注入の検証
      - name: Verify authentication injection
        if: ${{ env.AUTH_PASSWORD != '' }}
        env:
          AUTH_PASSWORD: ${{ secrets.PAGES_AUTH_PASSWORD }}
        run: |
          echo "認証スクリプトの注入を検証中..."

          FAILED=0

          # Dev環境の検証（PasswordGateコンポーネントで認証を実装）
          # 修正後の動作: inject-auth.jsはDev環境root index.htmlへの注入をスキップ
          # PasswordGateコンポーネント（React）がクライアント側認証を担当
          DEV_FILE="gh-pages/index.html"
          if [ -f "$DEV_FILE" ]; then
            echo "検証中: $DEV_FILE (Dev環境)"
            echo "  OK: PasswordGateコンポーネントで認証を実装しているため、スクリプト注入をスキップします"
          else
            echo "スキップ: $DEV_FILE (ファイルなし)"
          fi

          # Storybookの検証（manager-head.htmlで独自実装）
          SB_FILE="gh-pages/storybook/index.html"
          if [ -f "$SB_FILE" ]; then
            echo "検証中: $SB_FILE (Storybook)"

            # Storybookは独自の認証実装を使用（auth-overlay）
            if ! grep -q "sdpf_auth" "$SB_FILE"; then
              echo "  エラー: 認証スクリプトが見つかりません"
              FAILED=1
            else
              echo "  OK: 認証スクリプトが注入されています"
            fi

            # auth-overlayまたはパスワード変数の存在を確認
            if ! grep -Eq "auth-overlay|__STORYBOOK_AUTH_PASSWORD__" "$SB_FILE"; then
              echo "  警告: Storybook認証UIが見つかりません（正常な場合もあります）"
            else
              echo "  OK: Storybook認証UIが含まれています"
            fi
          else
            echo "スキップ: $SB_FILE (ファイルなし)"
          fi

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "認証スクリプトの検証に失敗しました"
            exit 1
          fi

          echo ""
          echo "認証スクリプトの検証が完了しました"

      # ビルド成果物のアップロード
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './gh-pages'

  # デプロイジョブ
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output deployment URLs
        run: |
          echo "Deployment completed!"
          echo "Dev environment: ${{ steps.deployment.outputs.page_url }}"
          echo "Storybook: ${{ steps.deployment.outputs.page_url }}storybook/"
