name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'

concurrency:
  group: ai-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # プロジェクトルールに基づくカスタムチェック
  custom-rules-check:
    name: Project Rules Check
    runs-on: ubuntu-latest
    outputs:
      issues_found: ${{ steps.check.outputs.issues_found }}
      review_comment: ${{ steps.check.outputs.review_comment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            src/**/*.ts
            src/**/*.tsx

      - name: Check project rules
        id: check
        run: |
          ISSUES=""
          ISSUES_COUNT=0

          echo "プロジェクトルールチェック開始..."

          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "チェック中: $file"

            # 1. any型チェック
            if grep -qn ": any" "$file" 2>/dev/null && ! grep -q "// eslint-disable" "$file" 2>/dev/null; then
              ISSUES="$ISSUES\n### $file\n- any型が使用されています。適切な型定義を行ってください。"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            fi

            # 2. 古いMUI Grid APIチェック
            if grep -qn "Grid item" "$file" 2>/dev/null; then
              ISSUES="$ISSUES\n### $file\n- 古いGrid API（Grid item）が使用されています。新しいAPI（Grid size={{ ... }}）を使用してください。"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            fi

            # 3. console.logチェック（テストファイル以外）
            if [[ ! "$file" =~ \.test\. ]] && [[ ! "$file" =~ \.stories\. ]]; then
              if grep -qn "console\.log" "$file" 2>/dev/null; then
                ISSUES="$ISSUES\n### $file\n- console.logが残存しています。デバッグ後は削除してください。"
                ISSUES_COUNT=$((ISSUES_COUNT + 1))
              fi
            fi

            # 4. React.FC使用チェック
            if grep -qn "React\.FC" "$file" 2>/dev/null; then
              ISSUES="$ISSUES\n### $file\n- React.FCの使用は推奨されません。Props型を直接指定してください。"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            fi

            # 5. 絵文字チェック
            if grep -Pqn '[\x{1F300}-\x{1F9FF}]' "$file" 2>/dev/null; then
              ISSUES="$ISSUES\n### $file\n- 絵文字が使用されています。テキストのみで表現してください。"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            fi
          done

          if [ $ISSUES_COUNT -gt 0 ]; then
            echo "issues_found=true" >> $GITHUB_OUTPUT
            # 複数行の出力をエスケープ
            ISSUES_ESCAPED=$(echo -e "$ISSUES" | sed ':a;N;$!ba;s/\n/\\n/g')
            echo "review_comment=$ISSUES_ESCAPED" >> $GITHUB_OUTPUT
          else
            echo "issues_found=false" >> $GITHUB_OUTPUT
            echo "review_comment=" >> $GITHUB_OUTPUT
          fi

          echo "検出された問題: $ISSUES_COUNT 件"

  # AIレビュー（OpenAI APIを使用）
  # PRに「skip-ai-review」ラベルが付いている場合はスキップ
  openai-review:
    name: OpenAI Review
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            src/**/*.ts
            src/**/*.tsx

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: AI Review with OpenAI
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');

            // APIキーが設定されていない場合はスキップ
            if (!process.env.OPENAI_API_KEY) {
              console.log('OPENAI_API_KEY が設定されていないためスキップ');
              return;
            }

            // OpenAI API呼び出し（フォールバック対応）
            async function callOpenAI(systemPrompt, userPrompt, maxTokens = 500) {
              const models = ['gpt-4.1-nano', 'gpt-4.1-mini'];

              for (const model of models) {
                try {
                  console.log(`モデル ${model} で試行中...`);
                  const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                      'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      model: model,
                      messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt }
                      ],
                      temperature: 0.3,
                      max_tokens: maxTokens
                    })
                  });

                  if (!response.ok) {
                    console.log(`${model} エラー: ${response.status}`);
                    continue;
                  }

                  const data = await response.json();
                  if (data.choices?.[0]?.message?.content) {
                    console.log(`${model} で成功`);
                    return data.choices[0].message.content;
                  }
                } catch (error) {
                  console.log(`${model} 例外: ${error.message}`);
                  continue;
                }
              }
              return null;
            }

            const changedFiles = `${{ steps.changed-files.outputs.all_changed_files }}`.split(' ').filter(f => f);

            if (changedFiles.length === 0) {
              console.log('変更されたファイルがありません');
              return;
            }

            // レビュー対象を最大5ファイルに制限
            const filesToReview = changedFiles.slice(0, 5);
            const reviews = [];

            const systemPrompt = `あなたは経験豊富な日本人シニアエンジニアです。
            以下の観点でコードレビューを日本語で簡潔に行ってください：
            1. セキュリティの問題
            2. パフォーマンスの改善点
            3. TypeScriptの型安全性
            4. React/MUIのベストプラクティス
            5. 潜在的なバグ

            問題がない場合は「問題なし」と回答してください。
            各指摘は箇条書きで簡潔に記載してください。`;

            for (const file of filesToReview) {
              try {
                const content = fs.readFileSync(file, 'utf8');
                if (content.length > 5000) {
                  console.log(`${file} はサイズが大きいためスキップ`);
                  continue;
                }

                const review = await callOpenAI(systemPrompt, `ファイル: ${file}\n\n${content}`);

                if (review && !review.includes('問題なし')) {
                  reviews.push({
                    file: file,
                    review: review
                  });
                }
              } catch (error) {
                console.error(`${file} のレビュー中にエラー: ${error}`);
              }
            }

            if (reviews.length > 0) {
              const comment = `## AI コードレビュー結果\n\n${reviews.map(r =>
                `### ${r.file}\n\n${r.review}`
              ).join('\n\n---\n\n')}`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

  # レビュー結果の統合コメント
  post-review-summary:
    name: Post Review Summary
    runs-on: ubuntu-latest
    needs: [custom-rules-check]
    if: always()
    steps:
      - name: Post rules check comment
        if: ${{ needs.custom-rules-check.outputs.issues_found == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issues = `${{ needs.custom-rules-check.outputs.review_comment }}`.replace(/\\n/g, '\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## プロジェクトルールチェック結果\n\n以下の問題が検出されました：\n${issues}\n\n---\n*AI_DEVELOPMENT_RULES.md を参照してください。*`
            });

      - name: Create summary
        run: |
          echo "## AIレビュー結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.custom-rules-check.outputs.issues_found }}" == "true" ]; then
            echo "プロジェクトルールチェック: 問題あり" >> $GITHUB_STEP_SUMMARY
          else
            echo "プロジェクトルールチェック: 問題なし" >> $GITHUB_STEP_SUMMARY
          fi
