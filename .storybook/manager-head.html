<!-- Kaze Design System - Manager Head -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  /* 選択中のストーリー: 背景がティールなので白文字にする */
  [data-selected='true'] {
    color: #ffffff !important;
  }

  /* 検索ボックスのフォーカスリング */
  [class*='search'] input:focus {
    border-color: #0eadb8;
    box-shadow: 0 0 0 1px #0eadb8;
  }

  /* スクロールバー */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-thumb {
    background: #b0dfe3;
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #0eadb8;
  }

  /* サイドバーフォント */
  .sidebar-container,
  [class*='Sidebar'] {
    font-family: 'Inter', 'Noto Sans JP', sans-serif !important;
  }
</style>
