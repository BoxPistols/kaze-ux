<!-- Kaze Design System - Manager Head -->
<style>
  /* サイドバーのブランドカラーアクセント */
  .sidebar-header [class*='Brand'] {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  /* 選択中のストーリーにブランドカラーのアクセント */
  [data-selected='true'] {
    color: #0eadb8 !important;
  }

  /* 検索ボックスのフォーカスリング */
  [class*='search'] input:focus {
    border-color: #0eadb8;
    box-shadow: 0 0 0 1px #0eadb8;
  }

  /* スクロールバーのアクセントカラー */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-thumb {
    background: #b0dfe3;
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #0eadb8;
  }
</style>
