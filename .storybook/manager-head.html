<!-- Kaze Design System - Manager Head -->
<style>
  /* カスタムロゴ: Storybook 純正ロゴを非表示にし、テキストロゴに置換 */
  .sidebar-header [class*='HeadingWrapper'] img,
  .sidebar-header [class*='HeadingWrapper'] svg {
    display: none !important;
  }

  .sidebar-header [class*='HeadingWrapper']::before {
    content: '風';
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, #0eadb8, #0a8a94);
    color: #fff;
    font-size: 14px;
    font-weight: 800;
    margin-right: 8px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(14, 173, 184, 0.25);
  }

  /* ブランド名のスタイル */
  .sidebar-header [class*='Brand'] {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1a2e2e;
  }

  /* 選択中のストーリーにブランドカラーのアクセント */
  [data-selected='true'] {
    color: #0eadb8 !important;
  }

  /* 検索ボックスのフォーカスリング */
  [class*='search'] input:focus {
    border-color: #0eadb8;
    box-shadow: 0 0 0 1px #0eadb8;
  }

  /* スクロールバー */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-thumb {
    background: #b0dfe3;
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #0eadb8;
  }

  /* サイドバー全体のトーン */
  .sidebar-container,
  [class*='Sidebar'] {
    font-family: 'Inter', 'Noto Sans JP', sans-serif !important;
  }
</style>
